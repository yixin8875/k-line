name: Build And Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            wails_platform: windows/amd64
          - name: macos-universal
            os: macos-latest
            wails_platform: darwin/universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build app
        shell: bash
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build \
            -clean \
            -platform ${{ matrix.wails_platform }} \
            -ldflags "-X main.Version=${{ github.ref_name }} -X main.Repo=${{ github.repository }}"

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "build/bin/k-line.exe" "dist/k-line-${{ github.ref_name }}-windows-amd64.exe"

      - name: Package macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/k-line.app" "dist/k-line-${{ github.ref_name }}-macos-universal.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
